repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-merge-conflict
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty
        args: [check]
        language: python
        additional_dependencies: [ty]
        types: [python]
        pass_filenames: false
      - id: import-linter
        name: import-linter (dardcollect/pipeline layer DAG)
        entry: lint-imports --config pyproject.toml
        language: python
        additional_dependencies: [import-linter>=2.0]
        types: [python]
        pass_filenames: false
