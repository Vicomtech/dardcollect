# ─────────────────────────────────────────────────────────────────────────────
# DARDcollect — custom (non-Archive.org) IMAGE dataset config
#
# Lean config for a custom (non-Archive.org) IMAGE-ONLY dataset on a
# user-provided filesystem. Archive.org download and all video/audio/text stages
# are intentionally REMOVED — this dataset never uses them. For the full template
# with all modalities see config.yaml, or config.custom_all.yaml for a combined
# custom config.
#
# Stages that run for media_types: ["image"]:
#   images → face_crops_image → quality → filter → masks
# (frames is video-only and is skipped; masks tolerates its absence.)
#
# Input is scanned RECURSIVELY (rglob) from image_extraction.input_dir.
# ⚠️  output_root MUST live OUTSIDE that input dir, or the recursive scans would
# re-ingest outputs → infinite nesting. See config.custom_videos.yaml.
#
# Usage:  uv run python scripts/run_pipeline.py --config config.custom_images.yaml
# ─────────────────────────────────────────────────────────────────────────────

media_types: ["image"]           # image-only → images, face_crops_image, quality, filter, masks
gpu_id: 0                        # GPU device ID used by detection/pose/quality stages
log_level: INFO                  # Logging verbosity: DEBUG, INFO, WARNING, ERROR


# Outputs are templated with {output_root}; inputs are literal (the input
# tree is the dataset, not a generated artifact). See docs/0-GETTING-STARTED.md
# §"Path templating with {output_root}".
#
# ⚠️  output_root MUST live OUTSIDE image_extraction.input_dir. The image and
# face-crop stages scan input_dir RECURSIVELY (rglob), so nesting output_root
# under it re-ingests outputs every run.
output_root: "C:/LUI/dardcollect_output"  # all outputs written under this root (OUTSIDE the input tree)


# ─────────────────────────────────────────────────────────────────────────────
# Pipeline orchestrator — scripts/run_pipeline.py
# ─────────────────────────────────────────────────────────────────────────────
run_pipeline:
  skip_download: true            # true = do not prepend download stage (custom dataset already on disk)
  heartbeat_interval_seconds: 10 # orchestrator status update cadence (seconds)
  rerun_interval_seconds: 5      # max wait before a downstream refresh while deps are still active


# ─────────────────────────────────────────────────────────────────────────────
# Detector + pose config — read by extract_persons_from_images via DetectorConfig
# (which loads the 'person_extraction' section). This section holds the SHARED
# YOLOX + CIGPose detector config used by BOTH video person clips and image
# person detection; image detection reads only the detector fields below. The
# tracking_* fields are required by DetectorConfig but unused for static images
# (no temporal tracking) — keep sensible defaults.
# ─────────────────────────────────────────────────────────────────────────────
person_extraction:
  detection_threshold: 0.4       # Min YOLOX confidence to accept a person detection
  tracking_score_threshold: 0.4  # Unused for images (no tracking); required by DetectorConfig
  tracking_min_hits: 3           # Unused for images; required by DetectorConfig
  tracking_max_time_lost: 10     # Unused for images; required by DetectorConfig
  pose_keypoint_threshold: 0.4   # Min CIGPose keypoint confidence to treat a keypoint as visible


# ─────────────────────────────────────────────────────────────────────────────
# Image person detection — pipeline/extract_persons_from_images.py
# Reads images RECURSIVELY from input_dir, writes per-image detection JSONs
# (YOLOX bboxes + CIGPose 133-keypoint poses) to output_detections_dir.
# ─────────────────────────────────────────────────────────────────────────────
image_extraction:
  input_dir: "C:/LUI/images"                          # INPUT: your image dataset (scanned RECURSIVELY). Edit to your path.
  output_detections_dir: "{output_root}/extracted_image_detections"
  overwrite: true  # Re-process all images (even if JSONs exist)

  # ── Detection ───────────────────────────────────────────────────────────────
  detection_threshold: 0.4       # Min YOLOX confidence to accept a person detection
  max_bbox_area_percent: 60.0    # Reject detections covering more than this % of frame
  max_detection_aspect_ratio: 2.0  # Reject detections with width/height ratio > this

  # ── Face filtering ──────────────────────────────────────────────────────────
  require_face_visibility: true  # Reject detections with no visible face
  min_face_size_percent: 10.0    # Min face height as % of image height
  require_frontal_face: true
  frontal_symmetry_threshold: 0.65  # Nose-to-ear symmetry ratio for frontal filtering

  pose_keypoint_threshold: 0.4   # Min CIGPose keypoint confidence


# ─────────────────────────────────────────────────────────────────────────────
# Image face crop extraction — pipeline/extract_face_crops_from_images.py
# Reads static images + their detection JSONs from input_dir (written by
# extract_persons_from_images.py). Writes 616×616 OFIQ crops to output_dir.
# ─────────────────────────────────────────────────────────────────────────────
image_face_crop_extraction:
  input_dir: "C:/LUI/images"                          # same source images as image_extraction.input_dir
  detections_dir: "{output_root}/extracted_image_detections"  # ← must match image_extraction.output_detections_dir
  output_dir: "{output_root}/image_face_crops"

  detection_threshold: 0.3
  pose_keypoint_threshold: 0.3
  min_eye_distance_px: 10       # Minimum inter-eye distance (pixels) to accept a crop


# ─────────────────────────────────────────────────────────────────────────────
# Image face quality filtering — pipeline/filter_face_crops_by_quality.py
# Reads from input_dir (= image_face_crop_extraction.output_dir).
# Moves images that pass to output_dir, together with their sidecar JSONs.
# ─────────────────────────────────────────────────────────────────────────────
image_face_quality_filtering:
  input_dir: "{output_root}/image_face_crops"
  output_dir: "{output_root}/filtered_image_face_crops"
  min_free_disk_gb: 2.0

  # ── Quality threshold ───────────────────────────────────────────────────────
  # Raw magnitude output of magface_iresnet50_norm.onnx (higher = better quality).
  # An image passes if it meets or exceeds this value.
  quality_threshold: 8.0


# ─────────────────────────────────────────────────────────────────────────────
# Image face quality annotation — pipeline/annotate_face_quality.py
# Reads from input_dir (= image_face_crop_extraction.output_dir, raw); the
# filtered dir is also scanned so re-runs annotate keepers too.
# Writes a sibling .quality.json next to each image face crop.
# ─────────────────────────────────────────────────────────────────────────────
image_face_quality_annotation:
  input_dir: "{output_root}/image_face_crops"
  frame_stride: 1   # Score every N-th frame (1 = every frame; images are single-frame)
  max_frames: 1     # Maximum frames scored per image (0 = no limit; images are single-frame)
  overwrite: true   # Set true to re-annotate images that already have a .quality.json


# ─────────────────────────────────────────────────────────────────────────────
# GPU library paths (Windows only)
# CUDA: optional if %CUDA_PATH% is set or CUDA bin is on PATH
# TensorRT: required unless %TENSORRT_LIB_PATH% is set
# cuDNN: required unless cuDNN bin is on PATH
# ─────────────────────────────────────────────────────────────────────────────
gpu_paths:
  tensorrt_lib: 'C:\TensorRT-10.14.1.48\lib'  # nvinfer.dll
  cuda_bin: 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.1\bin'  # cublas64_12.dll
  cudnn_bin: 'C:\Program Files\NVIDIA\CUDNN\v9.17\bin\12.1' # cudnn64_9.dll