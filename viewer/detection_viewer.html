<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Common CSS -->
    <link rel="stylesheet" href="css/viewer-common.css">
    <link rel="stylesheet" href="css/viewer-images.css">
    <link rel="stylesheet" href="css/viewer-videos.css">
</head>
<body>
    <div class="container">
        <h1>
            <svg width="44" height="44" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

                <circle cx="32" cy="22" r="8" fill="#00ff88"/>

                <line x1="6" y1="6" x2="14" y2="14" stroke="#00d9ff" stroke-width="2"/>
                <line x1="58" y1="6" x2="50" y2="14" stroke="#00d9ff" stroke-width="2"/>
                <line x1="6" y1="58" x2="14" y2="50" stroke="#00d9ff" stroke-width="2"/>
                <line x1="58" y1="58" x2="50" y2="50" stroke="#00d9ff" stroke-width="2"/>
            </svg>
            Detection Review
        </h1>

        <div class="drop-zone" id="dropZone">
            <div style="margin-bottom: 20px;">
                <span style="font-size: 4rem;">📂</span>
            </div>
            <p style="font-size: 1.8rem; color: #fff; margin-bottom: 10px; font-weight: 600;">Open Output Folder</p>
            <p style="margin-top:5px; font-size:1.1rem; color:#a0aec0; margin-bottom: 30px;">
                Drag & Drop <code>extracted_person_clips</code> or <code>extracted_image_detections</code> folder here
            </p>
            <div style="display: flex; justify-content: center;">
                <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
                <label for="folderInput" style="
                    display: inline-block; 
                    padding: 16px 32px; 
                    background: linear-gradient(135deg, #00d9ff, #00ff88); 
                    color: #1a1a2e; 
                    border-radius: 12px; 
                    cursor: pointer; 
                    font-weight: 700;
                    font-size: 1.1rem;
                    box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
                    transition: transform 0.2s;
                ">Select Folder</label>
            </div>
            <input type="file" id="fileInput" multiple accept=".json,.mp4,.avi,.mkv,.mov,.webm" style="display:none">
        </div>

        <div class="viewer" id="viewer">
            <div class="info-bar">
                <div>
                    <div class="title" id="videoTitle">-</div>
                    <div class="meta" id="videoMeta">-</div>
                    <div class="meta" id="qualityMetrics" style="font-size: 0.85rem; margin-top: 8px; padding: 8px; background: #1a202c; border-radius: 4px; border-left: 3px solid #48bb78;"></div>
                </div>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <select id="folderSelector" style="
                        padding: 8px 12px;
                        background: #2d3748;
                        color: #fff;
                        border: 1px solid #4a5568;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 0.9rem;
                    ">
                        <option value="">-- Select Folder --</option>
                    </select>
                    <span class="frame-info" id="frameInfo">Frame: 0</span>
                </div>
                <div class="meta" id="segmentInfo">-</div>
            </div>

            <div class="help">
                <strong>Navigation:</strong> <kbd>←</kbd> / <kbd>→</kbd> Previous/Next | 
                <strong>Playback:</strong> <kbd>Space</kbd> Play/Pause
            </div>

            <div class="viz-controls">
                <label><input type="checkbox" id="showBBox" checked> Show Bounding Boxes</label>
                <label><input type="checkbox" id="showKeypoints" checked> Show Keypoints</label>
                <label><input type="checkbox" id="showScores" checked> Show Scores</label>
                <label><input type="checkbox" id="showIds" checked> Show IDs</label>
                <label><input type="checkbox" id="showFaceCropArcface" checked> <span style="color:#ffcc00">■</span> ArcFace</label>
                <label><input type="checkbox" id="showFaceCropOfiq" checked> <span style="color:#cc66ff">■</span> OFIQ</label>
                <label style="display:flex;align-items:center;gap:6px;">
                    Threshold: <input type="number" id="kptThreshold" value="0.3" min="0" max="1" step="0.05"
                           style="width:60px;background:#2d3748;color:#fff;border:1px solid #4a5568;border-radius:4px;padding:2px 4px;">
                </label>
            </div>

            <!-- Video Container -->
            <div class="video-container" id="videoContainer">
                <video id="videoPlayer"></video>
                <canvas id="overlayCanvas"></canvas>
            </div>

            <!-- Image Container -->
            <div class="image-container" id="imageContainer">
                <canvas id="imageCanvas" style="max-width:100%; max-height:70vh; display:block;"></canvas>
            </div>

            <div class="progress-bar" id="progressBar">
                <input type="range" id="segmentProgress" min="0" max="1000" value="0" step="1">
            </div>

            <div class="controls" style="margin-top: 15px;">
                <button id="prevImage" style="display:none">⏪ Prev</button>
                <button id="prevVideo" style="display:none">⏪ Prev Video</button>
                <button id="prevFrame" style="display:none">◀ Prev Frame</button>
                <button id="playPause" style="display:none">▶ Play</button>
                <button id="nextFrame" style="display:none">Next Frame ▶</button>
                <button id="nextVideo" style="display:none">Next Video ⏩</button>
                <button id="nextImage" style="display:none">Next ⏩</button>
            </div>

            <div id="segmentNav" class="segment-nav"></div>

            <h3 style="margin: 20px 0 10px; color: #a0aec0;">Items (<span id="videoCount">0</span>)</h3>
            <div id="videoList" class="video-list"></div>
        </div>
    </div>

    <!-- Inline Config (must be before other scripts) -->

            LINE_WIDTH_BBOX: 3,

            SKELETON: [
                [1, 3], [1, 0], [2, 0], [2, 4], [0, 5], [0, 6], [5, 6],

                [11, 13], [13, 15], [12, 14], [14, 16], [15, 17], [15, 18], [15, 19],
                [16, 20], [16, 21], [16, 22],
                [91, 92], [92, 93], [93, 94], [94, 95], [91, 96], [96, 97], [97, 98], [98, 99],
                [91, 100], [100, 101], [101, 102], [102, 103], [91, 104], [104, 105], [105, 106], [106, 107],
                [91, 108], [108, 109], [109, 110], [110, 111], [112, 113], [113, 114], [114, 115], [115, 116],
                [112, 117], [117, 118], [118, 119], [119, 120], [112, 121], [121, 122], [122, 123], [123, 124],
                [112, 125], [125, 126], [126, 127], [127, 128], [112, 129], [129, 130], [130, 131], [131, 132],
                [23, 24], [24, 25], [25, 26], [26, 27], [27, 28], [28, 29], [29, 30], [30, 31],
                [31, 32], [32, 33], [33, 34], [34, 35], [35, 36], [36, 37], [37, 38], [38, 39],
                [40, 41], [41, 42], [42, 43], [43, 44], [45, 46], [46, 47], [47, 48], [48, 49],
                [50, 51], [51, 52], [52, 53], [53, 54], [55, 56], [56, 57], [57, 58], [58, 59],
                [60, 61], [61, 62], [62, 63], [63, 64], [64, 65], [65, 66], [66, 67], [60, 64],
                [68, 69], [69, 70], [70, 71], [71, 72], [72, 73], [73, 74], [74, 75], [68, 72],
                [76, 77], [77, 78], [78, 79], [79, 80], [80, 81], [81, 82], [82, 83], [83, 84], [84, 85], [85, 86], [86, 87], [76, 82]
            ]
        };
        window.VIEWER_STATE = {
            imageMode: false, imageDetections: [], currentImageIdx: 0, currentImageData: null,
            videoDetections: [], videoFiles: {}, qualityMap: {}, transcriptionMap: {},
            currentVideoIndex: 0, currentSegmentIndex: 0, fps: 30, isLoading: false, savedState: null
        };
        window.STORAGE_KEY = 'viewer_state';
        window.getColorForId = function(id) {
            return window.VIEWER_CONFIG.COLORS[id % window.VIEWER_CONFIG.COLORS.length];
        };
        window.formatTime = function(seconds) {
            if (seconds == null) return '?';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };
    </script>

    <!-- Scripts -->
    <script src="./js/viewer-common.js"></script>
    <script src="./js/viewer-images.js"></script>
    <script src="./js/viewer-videos.js"></script>
    
    <script>
        /**
         * Main Dispatcher with Folder Selector
         * Detects content type and loads appropriate viewer
         */
        
        let currentIndex = null;
        let currentViewer = null;

        async function initializeViewer() {
            try {
                ViewerCommon.initializeDomElements();
                
                // Load server data
                const index = await ViewerCommon.loadFromServer();
                
                if (!index) {
                    console.log('No data_index.json found - waiting for manual file upload');
                    setupDropZoneHandlers();
                    return;
                }

                console.log('[INIT] Found data_index.json:', index);
                currentIndex = index;

                // Check for folders
                if (!index.folders) {
                    console.log('No folders in index - waiting for manual file upload');
                    setupDropZoneHandlers();
                    return;
                }

                // Populate folder selector
                populateFolderSelector(index.folders);

                // Try image viewer first
                if (index.folders['extracted_image_detections']) {
                    const imageFolder = index.folders['extracted_image_detections'];
                    const items = imageFolder.items || [];
                    
                    if (items.length > 0) {
                        console.log(`[INIT] Loading ${items.length} image detections`);
                        loadFolder('extracted_image_detections');
                        return;
                    }
                }

                // Fallback to video viewer
                if (index.folders['extracted_person_clips']) {
                    const videoFolder = index.folders['extracted_person_clips'];
                    const items = videoFolder.items || [];
                    
                    if (items.length > 0) {
                        console.log(`[INIT] Loading ${items.length} video clips`);
                        loadFolder('extracted_person_clips');
                        return;
                    }
                }

                console.log('No content found in folders - waiting for manual file upload');
                setupDropZoneHandlers();
            } catch (e) {
                console.error('Initialization error:', e);
                setupDropZoneHandlers();
            }
        }

        function populateFolderSelector(folders) {
            const selector = document.getElementById('folderSelector');
            if (!selector) return;

            const availableFolders = Object.entries(folders)
                .filter(([name, folder]) => folder.items && folder.items.length > 0)
                .map(([name, folder]) => ({
                    name,
                    label: name.replace(/extracted_/g, '').replace(/_/g, ' '),
                    count: folder.items.length
                }));

            // Clear existing options
            selector.innerHTML = '<option value="">-- Select Folder --</option>';

            // Add folder options
            availableFolders.forEach(folder => {
                const option = document.createElement('option');
                option.value = folder.name;
                option.textContent = `${folder.label} (${folder.count})`;
                selector.appendChild(option);
            });

            // Set default selection to first folder with items
            if (availableFolders.length > 0) {
                selector.value = availableFolders[0].name;
                // Don't trigger change event here, it's done by initialization
            }

            // Add change handler
            selector.addEventListener('change', async (e) => {
                if (e.target.value) {
                    await loadFolder(e.target.value);
                }
            });
        }

        async function loadFolder(folderName) {
            if (!currentIndex || !currentIndex.folders[folderName]) {
                console.error('Folder not found:', folderName);
                return;
            }

            const folderData = currentIndex.folders[folderName];
            const items = folderData.items || [];

            if (items.length === 0) {
                console.log('Folder is empty:', folderName);
                return;
            }

            // Clean up previous viewer
            if (currentViewer) {
                console.log('[CLEANUP] Cleaning up previous viewer');
                // Stop any video playback
                const videoPlayer = document.getElementById('videoPlayer');
                if (videoPlayer) {
                    videoPlayer.pause();
                    videoPlayer.src = '';
                }
                // Clear canvas
                const canvas = document.getElementById('overlayCanvas');
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                const imageCanvas = document.getElementById('imageCanvas');
                if (imageCanvas) {
                    const ctx = imageCanvas.getContext('2d');
                    if (ctx) ctx.clearRect(0, 0, imageCanvas.width, imageCanvas.height);
                }
                // Reset state
                VIEWER_STATE.imageMode = null;
            }

            // Determine viewer type
            let viewer = null;
            if (folderName.includes('image')) {
                console.log(`[LOAD] Loading ${items.length} image detections from ${folderName}`);
                viewer = new ImageViewer();
            } else if (folderName.includes('clip') || folderName.includes('video')) {
                console.log(`[LOAD] Loading ${items.length} video clips from ${folderName}`);
                viewer = new VideoViewer();
            } else {
                console.log(`[LOAD] Unknown folder type: ${folderName}`);
                return;
            }

            // Update selector value
            const selector = document.getElementById('folderSelector');
            if (selector) {
                selector.value = folderName;
            }

            // Initialize viewer (await in case it's async)
            await Promise.resolve(viewer.init(items));
            currentViewer = viewer;
        }

        function setupDropZoneHandlers() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const folderInput = document.getElementById('folderInput');
            
            if (dropZone) {
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.add('dragover');
                });
                
                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('dragover');
                });
                
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.remove('dragover');
                    
                    if (e.dataTransfer.items) {
                        const items = [];
                        for (let item of e.dataTransfer.items) {
                            if (item.kind === 'file') {
                                items.push(item.getAsFile());
                            }
                        }
                        handleFiles(items);
                    }
                });
            }

            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    handleFiles(Array.from(e.target.files));
                });
            }

            if (folderInput) {
                folderInput.addEventListener('change', (e) => {
                    handleFiles(Array.from(e.target.files));
                });
            }
        }

        function handleFiles(files) {
            console.log('Got files:', files.length);
            // TODO: Implement file handling (load JSONs and videos)
        }

        // Initialize on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeViewer);
        } else {
            initializeViewer();
        }
    </script>
</body>
</html>
