# ─────────────────────────────────────────────────────────────────────────────
# Download — pipeline/download_media_from_archive.py (supports videos, images, audio, texts)
# ─────────────────────────────────────────────────────────────────────────────

# ── Which media types to download ───────────────────────────────────────────────
# Options: "video", "image", "audio", "text" — combine as needed
# Examples:
#   media_types: ["video"]                    # Videos only (default)
#   media_types: ["video", "image"]           # Videos and images
#   media_types: ["image"]                    # Images only
media_types: ["video", "image", "audio", "text"]

# ── Global download settings ────────────────────────────────────────────────────
search_sort: "date desc"       # Order by date descending (newer to older)
max_workers: 10                # Parallel download threads
max_total_size_gb: 10          # Stop downloading once this total size is reached
retry_delay: 5                 # Seconds to wait before retrying a failed download
base_output_dir: "DARD/archive_org_public_domain"  # Base; creates archive_org_videos/, archive_org_images/, etc.

# ── Per-media-type configuration ────────────────────────────────────────────────

media_download:
  # ──────────────────────────────────────────────────────────────────────────────
  # VIDEO — Feature films, classic TV, etc.
  # ──────────────────────────────────────────────────────────────────────────────
  video:
    output_subdir: "videos"
    min_duration_minutes: 20  # Skip videos shorter than this
    search_query: >
      mediatype:(movies)
      AND year:[1900 TO 1955]
      AND licenseurl:*publicdomain*
      AND (collection:feature_films
      OR collection:sci_fi_horror
      OR collection:comedy_films
      OR collection:silent_films
      OR collection:film_noir
      OR collection:western_and_cowboy_films
      OR collection:drama_movies
      OR collection:classic_tv)
      AND (language:bul OR language:hrv OR language:cze OR language:dan
      OR language:dut OR language:eng OR language:est OR language:fin
      OR language:fre OR language:ger OR language:gre OR language:hun
      OR language:gle OR language:ita OR language:lav OR language:lit
      OR language:mlt OR language:pol OR language:por OR language:rum
      OR language:slo OR language:slv OR language:spa OR language:swe)
      AND NOT subject:cartoon
      AND NOT subject:animation
      AND NOT subject:animated

  # ──────────────────────────────────────────────────────────────────────────────
  # IMAGE — Photographs of people (portraits, family photos, group photos)
  # ──────────────────────────────────────────────────────────────────────────────
  image:
    output_subdir: "images"
    search_query: >
      mediatype:(image)
      AND year:[1900 TO 1955]
      AND licenseurl:*publicdomain*
      AND subject:(portrait OR family OR "group photograph" OR people OR person)
      AND NOT subject:(architecture OR landscape OR building OR vehicle)

  # ──────────────────────────────────────────────────────────────────────────────
  # AUDIO — Spoken word, interviews, audiobooks, radio programs (voice-only)
  # ──────────────────────────────────────────────────────────────────────────────
  audio:
    output_subdir: "audio"
    search_query: >
      mediatype:(audio)
      AND year:[1900 TO 1955]
      AND licenseurl:*publicdomain*
      AND NOT subject:(music OR song OR songs OR opera OR operetta OR symphonie OR kunstlied OR jazz)
      AND NOT collection:(audio_music OR 78rpm OR emiliosunforgottenmusic OR hifidelity OR emilios78heritage)
      AND (collection:(audio_bookspoetry OR audio_sermons OR audio_religion OR oldtimeradio OR radioprograms)
      OR subject:(sermon OR audiobook OR "old time radio" OR "crime drama" OR speech OR spoken))
      AND (language:bul OR language:hrv OR language:cze OR language:dan
      OR language:dut OR language:eng OR language:est OR language:fin
      OR language:fre OR language:ger OR language:gre OR language:hun
      OR language:gle OR language:ita OR language:lav OR language:lit
      OR language:mlt OR language:pol OR language:por OR language:rum
      OR language:slo OR language:slv OR language:spa OR language:swe)

  # ──────────────────────────────────────────────────────────────────────────────
  # TEXT — Books, documents, scripts
  # ──────────────────────────────────────────────────────────────────────────────
  text:
    output_subdir: "texts"
    search_query: >
      mediatype:(texts)
      AND year:[1900 TO 1955]
      AND licenseurl:*publicdomain*
      AND (language:bul OR language:hrv OR language:cze OR language:dan
      OR language:dut OR language:eng OR language:est OR language:fin
      OR language:fre OR language:ger OR language:gre OR language:hun
      OR language:gle OR language:ita OR language:lav OR language:lit
      OR language:mlt OR language:pol OR language:por OR language:rum
      OR language:slo OR language:slv OR language:spa OR language:swe)

gpu_id: 6       # GPU device ID used by all pipeline stages
log_level: INFO  # Logging verbosity: DEBUG, INFO, WARNING, ERROR


# ─────────────────────────────────────────────────────────────────────────────
# Document preprocessing — pipeline/extract_text_from_doc.py
# ⚠️  TEXTS ONLY — Extracts text from downloaded documents and writes sidecars.
# Supported formats: PDF (text layer or OCR fallback), TXT.
# OCR uses PaddleOCR ONNX models from dardcollect/models/ (ch_PP-OCRv4_det/rec_infer.onnx).
# ─────────────────────────────────────────────────────────────────────────────
document_preprocessing:
  input_dir: "DARD/archive_org_public_domain/texts"  # ← texts from media_download.text.output_subdir
  output_dir: "DARD/preprocessed_documents"
  overwrite: false       # Set true to re-process documents that already have sidecars
  min_text_length: 50    # Discard documents with fewer extracted characters (likely failed OCR)
  enable_ocr: true       # Enable PaddleOCR fallback for scanned PDFs (text layer < 100 chars)
  ocr_languages:         # ISO 639-2/B codes — informational; single rec model (ch_PP-OCRv4_rec_infer.onnx)
    - bul                # used for all languages regardless of this list.
    - hrv
    - cze
    - dan
    - dut
    - eng
    - est
    - fin
    - fre
    - ger
    - gre
    - hun
    - gle
    - ita
    - lav
    - lit
    - mlt
    - pol
    - por
    - rum
    - slo
    - slv
    - spa
    - swe


# ─────────────────────────────────────────────────────────────────────────────
# Person clip extraction — pipeline/extract_person_clips_from_videos.py
# ⚠️  VIDEOS ONLY — Reads MP4 files from video media type folder.
# Extracts person clips with temporal tracking data.
# Reads from input_dir, writes to output_clips_dir.
# output_clips_dir must match face_crop_extraction.input_dir.
# ─────────────────────────────────────────────────────────────────────────────
person_extraction:
  # Input/output
  input_dir: "DARD/archive_org_public_domain/videos"   # ← videos from media_download.video.output_subdir
  output_clips_dir: "DARD/extracted_person_clips"  # ← must match face_crop_extraction.input_dir
  min_free_disk_gb: 2.0  # Abort immediately if free space drops below this

  # ── Detection ───────────────────────────────────────────────────────────────
  detection_threshold: 0.4       # Min YOLOX confidence to accept a person detection
  # Reject detections whose bbox covers more than this % of the frame area.
  # Catches false positives on title cards, text overlays, and full-frame graphics.
  max_bbox_area_percent: 60.0
  # Reject detections whose width/height ratio exceeds this value.
  # People (standing, crouching, kneeling) are almost never wider than ~1.8× their height.
  # Saddles, animals, and furniture typically exceed 2.0.
  max_detection_aspect_ratio: 2.0
  # When two active tracks overlap above this IoU the lower-confidence one is dropped.
  # Fixes cases where a single person spawns two competing tracks.
  max_track_overlap_iou: 0.5

  # ── Tracking (OC-SORT) ──────────────────────────────────────────────────────
  tracking_score_threshold: 0.4  # Min IoU match score to associate a detection with a track
  tracking_min_hits: 3           # Frames a track must be seen before it appears in output
  tracking_max_time_lost: 10     # Frames without a match before a track is removed

  # ── Pose estimation ─────────────────────────────────────────────────────────
  pose_keypoint_threshold: 0.4   # Min CIGPose keypoint confidence to treat a keypoint as visible

  # ── Face visibility filtering ───────────────────────────────────────────────
  require_face_visibility: true  # Discard clips with no frames containing a visible face
  min_face_size_percent: 10.0    # Min face height as % of image height (rejects distant persons)
  min_face_visible_frames: 15    # Min total frames with a visible face across the clip
  min_consecutive_face_frames: 5 # Min unbroken run of face-visible frames; complements the
                                 # total above by rejecting scattered single-frame appearances

  # ── Frontal face filtering ──────────────────────────────────────────────────
  require_frontal_face: true
  frontal_symmetry_threshold: 0.65  # Nose-to-ear symmetry ratio; 0=any yaw, 1=perfectly frontal

  # ── Mouth open detection ────────────────────────────────────────────────────
  enable_visual_speaking: true   # Count frames where at least one visible person has mouth open

  # ── Scene change detection ──────────────────────────────────────────────────
  # A hard cut causes a sudden drop in luminance-histogram correlation between
  # consecutive frames. When detected the active segment is closed and the tracker
  # is reset so that track IDs cannot bleed across shots.
  scene_change_detection: true
  scene_change_threshold: 0.75      # Luminance correlation below this triggers a cut (0=any change, 1=identical)
  scene_change_bbox_area_ratio: 4.0 # Max/min bbox area ratio that triggers a cut.
                                    # Wide-shot→close-up gives ~16× ratio, well above 4.

  # ── Clip segmentation ───────────────────────────────────────────────────────
  min_clip_duration_seconds: 2.0    # Discard clips shorter than this
  max_clip_duration_seconds: 60.0   # Split clips longer than this into sub-clips
  min_consecutive_frames: 10        # Discard clips with fewer than this many frames
  # merge_gap_frames should match tracking_max_time_lost: a detection gap within that
  # window is a tracker glitch, not a genuine break between two separate appearances.
  merge_gap_frames: 10


# ─────────────────────────────────────────────────────────────────────────────
# Image person detection — pipeline/extract_persons_from_images.py
# ⚠️  IMAGES ONLY — Parallel pipeline to extract_person_clips_from_videos.py (videos).
# Detects people in static images, creates detection JSONs with FAIR metadata.
# Reads from input_dir, writes detection JSONs to output_detections_dir.
# ─────────────────────────────────────────────────────────────────────────────
image_extraction:
  input_dir: "DARD/archive_org_public_domain/images"  # JPGs from media_download.image.output_subdir
  output_detections_dir: "DARD/extracted_image_detections"
  overwrite: true  # Re-process all images (even if JSONs exist)
  
  # ── Detection ───────────────────────────────────────────────────────────────
  detection_threshold: 0.4       # Min YOLOX confidence to accept a person detection
  max_bbox_area_percent: 60.0    # Reject detections covering more than this % of frame
  max_detection_aspect_ratio: 2.0  # Reject detections with width/height ratio > this
  
  # ── Face filtering ──────────────────────────────────────────────────────────
  require_face_visibility: true  # Reject detections with no visible face
  min_face_size_percent: 10.0    # Min face height as % of image height
  require_frontal_face: true
  frontal_symmetry_threshold: 0.65  # Nose-to-ear symmetry ratio for frontal filtering
  
  pose_keypoint_threshold: 0.4   # Min CIGPose keypoint confidence


# ─────────────────────────────────────────────────────────────────────────────
# Face crop extraction — pipeline/extract_face_crops_from_videos.py and extract_face_crops_from_images.py
# Reads clips from input_dir (person clips from videos OR image detections).
# extract_face_crops_from_videos.py processes video person clips.
# extract_face_crops_from_images.py processes still image detections.
# ─────────────────────────────────────────────────────────────────────────────
face_crop_extraction:
  input_dir: "DARD/extracted_person_clips"  # ← must match person_extraction.output_clips_dir
  output_dir: "DARD/face_crops"
  min_free_disk_gb: 2.0

  # ── Output video ────────────────────────────────────────────────────────────
  # 616×616 OFIQ-aligned crops written directly to output_dir/ (no subdirs).
  # Sidecar JSONs include arcface_crop_corners_in_ofiq for MagFace scoring.
  include_audio: true     # Mux the corresponding audio into each face video.
                          # Has no effect when skip_no_face_frames is true (audio would be out of sync).

  # ── Detection / pose thresholds ─────────────────────────────────────────────
  detection_threshold: 0.3      # Lower than person_extraction: face crops tolerate noisier detections
  pose_keypoint_threshold: 0.3
  min_eye_distance_px: 10       # Minimum inter-eye distance (pixels) to accept a crop

  # ── Per-track filtering ─────────────────────────────────────────────────────
  min_track_face_frames: 10  # Tracks with fewer valid face frames produce no output

  # ── Gap handling (frames where no face is detected within a track) ───────────
  # false = repeat the last valid crop (no black frames, audio stays in sync)
  # true  = skip those frames (output video shorter than source, audio out of sync)
  skip_no_face_frames: false

  # ── Overlap filtering ───────────────────────────────────────────────────────
  # If a person's bbox overlaps another by more than this IoU in a frame, that
  # frame is skipped (last valid crop repeated). Prevents mixing two identities
  # when people pass close to each other.
  max_overlap_iou: 0.3


# ─────────────────────────────────────────────────────────────────────────────
# Face quality filtering — pipeline/filter_face_crops_by_quality.py
# Reads from input_dir (= face_crop_extraction.output_dir).
# Moves videos that pass to output_dir, together with their sidecar JSONs.
# ─────────────────────────────────────────────────────────────────────────────
face_quality_filtering:
  input_dir: "DARD/face_crops"            # ← must match face_crop_extraction.output_dir
  output_dir: "DARD/filtered_face_crops"  # passing videos moved here
  min_free_disk_gb: 2.0

  # ── Quality threshold ───────────────────────────────────────────────────────
  # Raw magnitude output of magface_iresnet50_norm.onnx (higher = better quality).
  # A video passes if at least one frame meets or exceeds this value.
  quality_threshold: 30.0


# ─────────────────────────────────────────────────────────────────────────────
# Face quality annotation — pipeline/annotate_face_quality.py
# Reads from input_dir (= face_quality_filtering.output_dir).
# Writes a sibling .quality.json next to each face crop video.
# ─────────────────────────────────────────────────────────────────────────────
face_quality_annotation:
  input_dir: "DARD/filtered_face_crops"  # ← must match face_quality_filtering.output_dir
  frame_stride: 5   # Score every N-th frame (1 = every frame)
  max_frames: 30    # Maximum frames scored per video (0 = no limit)
  overwrite: true  # Set true to re-annotate videos that already have a .quality.json


# ─────────────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────
# Video transcription — pipeline/transcribe_video_clips.py
# Reads from input_dir (= person_extraction.output_clips_dir).
# Writes a sibling .transcription.json next to each person clip video.
# ─────────────────────────────────────────────────────────────────────────────
transcription:
  input_dir: "DARD/extracted_person_clips"  # ← must match person_extraction.output_clips_dir
  overwrite: false                          # Set true to re-transcribe clips that already have a .transcription.json


# ─────────────────────────────────────────────────────────────────────────────
# Audio transcription — pipeline/transcribe_audio_files.py
# Reads audio files from audio_files_dir; writes .transcription.json sidecars
# to output_dir (preserving language subfolders).
# ─────────────────────────────────────────────────────────────────────────────
audio_transcription:
  audio_files_dir: "DARD/archive_org_public_domain/audio"  # ← audio from media_download.audio.output_subdir
  output_dir: "DARD/audio_transcriptions"                  # transcription sidecars written here
  overwrite: false                          # Set true to re-transcribe files that already have a sidecar


# ─────────────────────────────────────────────────────────────────────────────
# Frame extraction — pipeline/extract_frames_from_videos.py
# Extracts frames from either videos or image detections to PNG sequences.
# Can process person clips, face crops, or filtered crops (type inferred from folder name).
# Type is inferred from input_dir folder name (person_clips → person_clip, etc.).
# ─────────────────────────────────────────────────────────────────────────────
frame_extraction:
  input_dir: "DARD/extracted_person_clips"  # Source: person clips, face crops, or filtered crops
  output_dir: "DARD/extracted_frames"       # Where to write PNG frames + JSON sidecars
  overwrite: false                           # Skip already-extracted frames (resumable)


# ─────────────────────────────────────────────────────────────────────────────
# GPU paths (Windows only — optional)
# Add these if DLLs are not found automatically via PATH or CUDA_PATH.
# ─────────────────────────────────────────────────────────────────────────────
gpu_paths:
  tensorrt_lib: "C:/LUI/TensorRT-10.14.1.48/bin"                        # nvinfer.dll
  cuda_bin: "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.1/bin"  # cublas64_12.dll
  cudnn_bin: "C:/Program Files/NVIDIA/CUDNN/v9.17/bin/13.1"             # cudnn64_9.dll
